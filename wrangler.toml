# wrangler.toml — Cloudflare Pages bindings & non-secret env vars
# ⚠️  Never put API keys or secrets in this file — it is committed to git.
#     Add secrets via the Cloudflare dashboard or:
#       npx wrangler pages secret put SECRET_NAME --project-name team11projectgithub

name = "team11projectgithub"
pages_build_output_dir = "dist"

# ── Project name alias (used in pnpm scripts) ─────────────────────────────────
# Correct project name: team11projectgithub
# Legacy scripts referenced "gumdrop" — use team11projectgithub everywhere.

# ── Non-secret environment variables ─────────────────────────────────────────
[vars]
ALLOWED_EMAIL_DOMAIN = "ibm.com"

# ── KV namespace (OTP store) ──────────────────────────────────────────────────
[[kv_namespaces]]
binding = "OTP_STORE"
id      = "f17959f2f94a4c7799dd2a9c8608bf39"

# ── D1 database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "candyland-db"
database_id   = "effb499d-cbb7-4fa9-b5cf-9ea2ca8ad81a"

# ── Secrets (DO NOT add values here) ─────────────────────────────────────────
# Run these commands once to store them encrypted in Cloudflare:
#
#   npx wrangler pages secret put WXO_API_KEY    --project-name team11projectgithub
#   npx wrangler pages secret put RESEND_API_KEY --project-name team11projectgithub
#
# WXO_API_KEY  — API key from:
#                watsonx Orchestrate → user icon → Settings → API details → Generate API key
#                Instance: https://api.dl.watson-orchestrate.ibm.com/instances/20260716-1822-4087-90fe-3b3ba1d4cc84
#                Auth type: MCSP v2 (AWS-hosted)
#                This is NOT an IBM Cloud IAM key. NOT a username/password.
#
# RESEND_API_KEY — Resend transactional email key for OTP delivery.

# ── Cron triggers (alerts Worker) ────────────────────────────────────────────
# Evaluates stock price alerts once per hour via alerts.js onScheduled handler.
# NOTE: Cron is only supported in Cloudflare Workers (not Pages Functions).
# If deploying as Workers, add this block. For Pages, use a scheduled Worker
# that calls /api/alerts?action=cron with a service binding or Workers cron.
#
# Uncomment and add to a dedicated alerts Worker if needed:
# [triggers]
# crons = ["0 * * * *"]
